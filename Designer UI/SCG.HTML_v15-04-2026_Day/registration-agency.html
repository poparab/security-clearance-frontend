<!doctype html>
<html lang="ar" dir="rtl">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>نظام الموافقات الأمنية</title>
	<!-- Bootstrap File -->
	<link rel="stylesheet" type="text/css" href="css/bootstrap/bootstrap.rtl.min.css" >
	<!-- Font Awesome Style Sheet File -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">	
	<!-- Main Style Sheet File -->
	<link href="css/styles.css" rel="stylesheet" type="text/css">
	<!-- Browzer Tab Icon -->
	<link rel="shortcut icon" href="img/favicon.png" type="image/x-icon">
</head>

<body>
	
	<div class="container-fluid container-md-width">
		<div class="row">
			<div class="col-xl-6 col-xxl-5 login-right-side">
				<img class="login-logo" src="img/logo.png" alt="">
				<h2>إنشاء حساب وكالة ،،،</h2>
				<p class="mb-4">فضلاً أدخل بيانات الوكالة وقم برفع المستندات المطلوبة للمراجعة</p>
				<form action="">
					<div class="d-inline-flex selector-container">
						<input type="radio" class="btn-check" name="options-base" id="individualLogin" autocomplete="off">
						<label class="btn col-6" for="individualLogin"><img class="icon" src="icons/user.svg" alt=""> دخول أفراد</label>
					
						<input type="radio" class="btn-check" name="options-base" id="agencyLogin" autocomplete="off" checked>
						<label class="btn col-6" for="agencyLogin"><img class="icon" src="icons/agency.svg" alt=""> دخول وكلاء</label>
					</div><!-- End Selector Container -->
					
					
					<div class="input-group">
						<input type="text" class="form-control" id="InputAgencyName" aria-describedby="agencyName" placeholder="إسم الوكالة">
						<img class="input-icon" src="icons/agency.svg">
					</div><!-- End Input-Group -->
					
					
					<div class="input-group">
						<input type="text" class="form-control" id="InputCommercialNumber" aria-describedby="commercialNumber" placeholder="رقم السجل التجاري">
						<img class="input-icon" src="icons/commercial-card.svg">
					</div><!-- End Input-Group -->
					
					
					<div class="input-group">
						<input type="text" class="form-control" id="InputRepresentativeAgent" aria-describedby="representativeAgent" placeholder="إسم المندوب المفوض">
						<img class="input-icon" src="icons/user.svg">
					</div><!-- End Input-Group -->
					
				  <div class="input-group">
						<input type="email" class="form-control" id="InputEmail" aria-describedby="emailHelp" placeholder="البريد الإلكتروني للوكالة">
						<img class="input-icon" src="icons/mail.svg">
					</div><!-- End Input-Group -->

					<div class="row gx-3">
						<div class="col-5 col-sm-4 col-xxl-3">
							<div class="input-group">
								<select class="form-select country-key" aria-label="Default select example">
									<option value="EG" selected>🇪🇬 EG +20</option>
									<option value="KSA">🇸🇦 KSA +966</option>
									<option value="UAE">🇦🇪 UAE +971</option>
									<option value="QA">🇶🇦 QA +974</option>
								</select>
							</div><!-- End Input-Group -->
						</div><!-- End Col -->
						<div class="col-7 col-sm-8 col-xxl-9">
							<div class="input-group">
								<input type="tel" class="form-control" id="InputPhone" aria-describedby="agencyPhone" placeholder="رقم المحمول">
								<img class="input-icon" src="icons/cell-phone.svg">
							</div><!-- End Input-Group -->
						</div><!-- End Col -->
					</div><!-- End Row -->
					
					<div class="input-group">
						<input class="form-control custom-file-input" type="file" id="">
						<label class="custom-file-label" for="">
<!--							<i class="fa-solid fa-cloud-arrow-up"></i>-->
							<img src="icons/upload.svg" alt="">
							إضغط لرفع وثيقة الوكالة (رخصة تجارية) ، أو اسحبه هنا
							<span>فقط PDF — الحجم الأقصى 5 ميجابايت</span>
						</label>
					</div><!-- End Input Group -->

<!--

					<div class="input-group" id="show_hide_password">
						<input class="form-control password" type="password" id="passwordInput" placeholder="كلمة المرور">
						<img class="input-icon" src="icons/lock2.svg">
						<button class="show-hide-icon" type="button" aria-label="Toggle password visibility">
							<i class="fa-regular fa-eye" id="showHidePassword"></i>
						</button>
					</div>
-->

					<div class="col mb-4">
						<div class="form-check float-start">
      						<input class="form-check-input" type="checkbox" id="gridCheck">
      						<label class="form-check-label" for="gridCheck">بإرسال الطلب أوافق على</label>
						</div>
						
						<a class="tertiary-link float-start ms-1" href="javascript:;">الشروط والأحكام؟</a>
					</div><!-- End Col -->
					
					<button type="submit" class="btn btn-primary btn-submit">إرسال طلب التسجيل</button>
					
				</form><!-- End Form -->
				
				<div class="row align-content-center mb-4">
					<div class="col"><hr class="line"/></div><!-- End Col -->
					<div class="col-auto">أو</div><!-- End Col -->
					<div class="col"><hr class="line"/></div><!-- End Col -->
				</div><!-- End Row -->
				
				<div class="row row-cols-md-2 gx-4">
					<div class="col">
						<a class="btn btn-primary-outline btn-login-with" href="javascript:;">Apple <i class="fa-brands fa-apple"></i></a>
					</div>
					<div class="col">
						<a class="btn btn-primary-outline btn-login-with" href="javascript:;">google <img class="icon" src="icons/google.svg"></a>
					</div>
				</div><!-- End Row -->
				
				<div class="row row-cols-1 mt-4 mb-2">
					<div class="col text-center">
						لديك حساب بالفعل؟ <a class="tertiary-link" href="login.html">تسجيل الدخول</a>
					</div><!-- End Col -->
				</div><!-- End Row -->
				
			</div><!-- End Col -->
			
			<div class="d-none d-xl-block col-xl-6 col-xxl-7 login-left-side">
				<img src="img/login-Lock.png" alt="">
			</div><!-- End Col -->

		</div><!-- End Row -->
	</div><!-- End Container -->
	
	<script>
		document.addEventListener('DOMContentLoaded', function () {
    		const toggleButton = document.querySelector('#show_hide_password button');
			const passwordInput = document.querySelector('#passwordInput');
    		const toggleIcon = document.querySelector('#showHidePassword');

    		toggleButton.addEventListener('click', function (event) {
        		event.preventDefault();

        		// Toggle the type attribute
        		const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        		passwordInput.setAttribute('type', type);

        		// Toggle the eye icon class
        		if (type === 'text') {
            		toggleIcon.classList.remove('fa-eye');
            		toggleIcon.classList.add('fa-eye-slash');
        		} else {
            		toggleIcon.classList.remove('fa-eye-slash');
            		toggleIcon.classList.add('fa-eye');
        		}
    		});
		});
	</script>
</body>
</html>
